# Focus adjacent kitty windows with Alt + arrow keys.
map alt+left neighboring_window left
map alt+right neighboring_window right
map alt+up neighboring_window up
map alt+down neighboring_window down

# Create split windows with Alt + Shift shortcuts.
map alt+shift+backslash combine : goto_layout splits : launch --location=vsplit --cwd=current
map alt+shift+minus combine : goto_layout splits : launch --location=hsplit --cwd=current
